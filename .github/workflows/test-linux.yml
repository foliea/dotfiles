name: Run tests on linux

on:
  push:
    branches:
      - "*"

jobs:
  run-tests-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: dotfiles:linux
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run linting
        run: docker run --rm dotfiles:linux make lint

      - name: Run tests
        run: docker run --rm dotfiles:linux make test
