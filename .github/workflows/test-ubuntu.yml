name: Run tests on Ubuntu

on:
  push:
    branches:
      - "*"

jobs:
  run-test-ubuntu:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system packages
        run: |
          chmod +x os/ubuntu/dependencies.sh
          ./os/ubuntu/dependencies.sh install_shared_deps

      - name: Run tests
        run: |
          chmod +x run-tests.exp
          ./run-tests.exp