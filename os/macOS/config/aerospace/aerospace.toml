# AeroSpace config - Omarchy-style keybindings

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

[mode.main.binding]
# Focus (Cmd + HJKL)
cmd-h = 'focus --boundaries-action wrap-around-the-workspace left'
cmd-j = 'focus --boundaries-action wrap-around-the-workspace down'
cmd-k = 'focus --boundaries-action wrap-around-the-workspace up'
cmd-l = 'focus --boundaries-action wrap-around-the-workspace right'

# Move window (Cmd + Shift + HJKL)
cmd-shift-h = 'move left'
cmd-shift-j = 'move down'
cmd-shift-k = 'move up'
cmd-shift-l = 'move right'

# Resize mode
cmd-r = 'mode resize'

# Layouts
cmd-t = 'layout tiles horizontal vertical'
cmd-n = 'layout v_accordion'
cmd-p = 'layout h_accordion'

# Fullscreen
cmd-f = 'fullscreen'

# Floating toggle
cmd-shift-space = 'layout floating tiling'

# Reload config
cmd-shift-r = 'reload-config'

# Close window (Alt+W to avoid Cmd+W conflict with macOS close)
alt-w = 'close --quit-if-last-window'

# Terminal
cmd-enter = 'exec-and-forget open -n -a Ghostty'

# Tmux terminal
cmd-alt-enter = 'exec-and-forget open -n -a Ghostty --args -e sh -c "tmux attach || tmux new -s Work"'

# Browser
cmd-shift-b = 'exec-and-forget open -n -a "Google Chrome"'

# Browser (private)
cmd-alt-b = 'exec-and-forget open -n -a "Google Chrome" --args --incognito'

# Editor
cmd-shift-e = 'exec-and-forget open -n -a Ghostty --args -e nvim'

# Docker TUI
cmd-shift-d = 'exec-and-forget open -n -a Ghostty --args -e lazydocker'

# Git TUI
cmd-shift-g = 'exec-and-forget open -n -a Ghostty --args -e lazygit'

# File manager
cmd-shift-f = 'exec-and-forget open -n -a Finder'

# Calendar
cmd-shift-c = 'exec-and-forget open -n -a "Google Chrome" --args --app=https://calendar.google.com'

# Music
cmd-shift-m = 'exec-and-forget open -n -a Chromium --args --app=https://music.youtube.com'

# Notes
cmd-shift-n = 'exec-and-forget open -n -a Chromium --args --app=https://keep.google.com'

# YouTube
cmd-shift-y = 'exec-and-forget open -n -a Chromium --args --app=https://youtube.com'

# Photos
cmd-shift-p = 'exec-and-forget open -n -a Chromium --args --app=https://photos.google.com'

# X (Twitter)
cmd-shift-x = 'exec-and-forget open -n -a Chromium --args --app=https://x.com'

# AI Chat (Gemini)
cmd-shift-a = 'exec-and-forget open -n -a "Google Chrome" --args --app=https://gemini.google.com'

# Grok
cmd-alt-a = 'exec-and-forget open -n -a Chromium --args --app=https://grok.com'

# Workspaces (Cmd + 1-0)
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'
cmd-0 = 'workspace 10'

# Move workspace to monitor
cmd-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Move window to workspace (Cmd + Shift + 1-0)
cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'
cmd-shift-0 = 'move-node-to-workspace 10'

